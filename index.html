<!DOCTYPE html>
<html lang="ja" style="background:#0f0f10">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0f0f10">
<title>Moley</title>
<link rel="icon" type="image/png" href="icon-192v2.png">
<link rel="apple-touch-icon" href="icon-192v2.png">
<link rel="manifest" href="manifest.json">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
<noscript><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet"></noscript>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:       #0f0f10;
    --surface:  #151518;
    --surface2: #1a1a1e;
    --border:   #222226;
    --faint:    #2a2a2e;
    --text:     #e8e8e8;
    --muted:    #555;
    --accent:   #7c73ff;
    --accent-bg: rgba(124,115,255,0.12);
    --accent-glow: rgba(124,115,255,0.28);
    --font: 'Noto Sans JP', 'Hiragino Kaku Gothic ProN', sans-serif;
  }

  html, body {
    width: 100%; height: 100%; overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: var(--font);
    -webkit-tap-highlight-color: transparent;
    touch-action: manipulation;
  }

  #app {
    width: 100%; height: 100%;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
  }

  /* ─── SCREENS ─── */
  .screen {
    position: absolute; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 24px 20px;
    transition: opacity 0.35s ease, transform 0.35s ease;
  }
  .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.98); }

  /* ─── START ─── */
  #start-screen { gap: 44px; }

  .logo-area {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: fadeUp 0.5s ease both;
  }

  .logo-name {
    font-size: 22px; font-weight: 700;
    letter-spacing: 0.02em; color: var(--text);
  }

  .logo-sub {
    font-size: 11px; font-weight: 400;
    color: var(--muted); letter-spacing: 0.08em;
  }

  /* Mode */
  .mode-area {
    display: flex; flex-direction: column; align-items: center; gap: 12px;
    animation: fadeUp 0.5s 0.08s ease both;
    width: 100%; max-width: 280px;
  }

  .section-label {
    font-size: 10px; font-weight: 700;
    color: var(--muted); letter-spacing: 0.12em; text-transform: uppercase;
  }

  .mode-buttons { display: flex; gap: 10px; width: 100%; }

  .mode-btn {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    cursor: pointer;
    padding: 20px 0;
    display: flex; flex-direction: column;
    align-items: center; gap: 4px;
    transition: all 0.15s ease;
    font-family: var(--font);
  }

  .mode-btn:active {
    background: var(--accent-bg);
    border-color: rgba(124,115,255,0.35);
    transform: scale(0.96);
  }

  .mode-sec {
    font-size: 28px; font-weight: 700;
    color: var(--accent); line-height: 1;
  }

  .mode-unit {
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* ─── GAME ─── */
  #game-screen {
    justify-content: flex-start;
    padding: 0; gap: 0;
  }

  .game-header {
    width: 100%;
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 18px 12px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
  }

  .game-label {
    font-size: 12px; font-weight: 700;
    color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase;
  }

  /* Breath ring — the ring itself breathes */
  .breath-ring {
    position: relative; width: 64px; height: 64px;
    display: flex; align-items: center; justify-content: center;
  }

  .breath-ring-circle {
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--accent-bg);
    border: 1.5px solid rgba(124,115,255,0.45);
    animation: breathe 10s ease-in-out infinite;
  }

  /* Grid */
  .dot-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    grid-template-rows: repeat(4, 1fr);
    gap: 7px;
    width: 100%; flex: 1;
    padding: 10px 14px;
  }

  .cell {
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }

  .dot {
    border-radius: 50%;
    background: var(--accent);
    cursor: pointer;
    position: absolute;
    transform: scale(0);
    transition: transform 0.25s cubic-bezier(0.34,1.56,0.64,1);
    user-select: none;
    will-change: transform;
  }

  .dot.visible { transform: scale(1); }

  .dot.popping {
    transform: scale(0) !important;
    transition: transform 0.11s ease-in !important;
  }

  .ripple {
    position: absolute; border-radius: 50%;
    border: 2px solid rgba(78,205,196,0.5);
    transform: scale(0); opacity: 1;
    animation: rippleOut 0.42s ease-out forwards;
    pointer-events: none;
  }

  @keyframes rippleOut {
    to { transform: scale(2.2); opacity: 0; }
  }

  /* ─── COUNTDOWN OVERLAY ─── */
  .countdown-overlay {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    z-index: 80;
    background: rgba(15,15,16,0.75);
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.3s ease;
  }

  .countdown-overlay.show { opacity: 1; }

  .countdown-num {
    font-size: 88px; font-weight: 700;
    color: var(--accent);
    text-shadow: 0 0 32px var(--accent-glow);
    animation: countPop 0.9s ease both;
    line-height: 1;
  }

  @keyframes countPop {
    0%   { transform: scale(1.4); opacity: 0; }
    20%  { opacity: 1; }
    75%  { opacity: 1; transform: scale(1); }
    100% { opacity: 0; transform: scale(0.85); }
  }

  @keyframes breathe {
    0%   { transform: scale(0.68); opacity: 0.35; box-shadow: 0 0 8px var(--accent-glow); }
    40%  { transform: scale(1);    opacity: 1;    box-shadow: 0 0 28px var(--accent-glow); }
    50%  { transform: scale(1);    opacity: 1; }
    90%  { transform: scale(0.68); opacity: 0.35; box-shadow: 0 0 8px var(--accent-glow); }
    100% { transform: scale(0.68); opacity: 0.35; }
  }

  /* ─── END ─── */
  #end-screen { gap: 36px; }

  .end-text {
    text-align: center;
    animation: fadeUp 0.5s ease both;
  }
  .end-title { font-size: 24px; font-weight: 700; color: var(--text); }
  .end-sub   { font-size: 13px; color: var(--muted); margin-top: 6px; }

  .end-breath {
    display: flex; flex-direction: column; align-items: center; gap: 10px;
    animation: fadeUp 0.5s 0.08s ease both;
  }

  .end-breath-circle {
    width: 76px; height: 76px; border-radius: 50%;
    border: 1.5px solid rgba(124,115,255,0.3);
    background: var(--accent-bg);
    box-shadow: 0 0 22px var(--accent-glow);
    animation: breathe 10s ease-in-out infinite;
  }

  .end-breath-label {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted);
  }

  .replay-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 14px;
    color: var(--text);
    cursor: pointer;
    padding: 15px 44px;
    font-size: 14px; font-weight: 700;
    font-family: var(--font);
    display: flex; align-items: center; gap: 8px;
    transition: all 0.15s;
    animation: fadeUp 0.5s 0.14s ease both;
  }

  .replay-btn:active {
    background: var(--accent-bg);
    border-color: rgba(124,115,255,0.35);
    transform: scale(0.96);
  }

  .replay-icon { font-size: 15px; color: var(--accent); }

  /* Burst */
  .burst {
    position: fixed; border-radius: 50%; pointer-events: none;
    animation: burstOut 0.7s ease-out forwards; z-index: 50;
  }

  @keyframes burstOut {
    0%   { transform: scale(0); opacity: 0.55; }
    100% { transform: scale(3); opacity: 0; }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }
</style>
</head>
<body>
<div id="app">
    </div>
  </div>

  <!-- START -->
  <div class="screen hidden" id="start-screen">
    <div class="logo-area">
      <div class="logo-name">Moley</div>
      <div class="logo-sub">ソワソワを、つぶす</div>
    </div>
    <div class="mode-area">
      <span class="section-label">モードを選ぶ</span>
      <div class="mode-buttons">
        <button class="mode-btn" onclick="startGame(30)">
          <span class="mode-sec">30</span>
          <span class="mode-unit">sec</span>
        </button>
        <button class="mode-btn" onclick="startGame(60)">
          <span class="mode-sec">60</span>
          <span class="mode-unit">sec</span>
        </button>
      </div>
    </div>
  </div>

  <!-- GAME -->
  <div class="screen hidden" id="game-screen">
    <div class="game-header">
      <div style="width:52px"></div>
      <div class="breath-ring">
        <div class="breath-ring-circle"></div>
      </div>
      <div style="width:52px"></div>
    </div>
    <div class="dot-grid" id="dot-grid"></div>
  </div>

  <!-- END -->
  <div class="screen hidden" id="end-screen">
    <div class="end-text">
      <div class="end-title">おわり</div>
      <div class="end-sub">ちょっと落ち着いた？</div>
    </div>
    <div class="end-breath">
      <div class="end-breath-circle"></div>
      <span class="end-breath-label">ゆっくり息をして</span>
    </div>
    <button class="replay-btn" onclick="showScreen('start-screen')">
      <span class="replay-icon">↺</span>もう一度
    </button>
  </div>

</div>

<!-- Countdown overlay -->
<div class="countdown-overlay" id="countdown-overlay">
  <div class="countdown-num" id="countdown-num">3</div>
</div>

<script>
// ── CONFIG ──
const COLS = 5, ROWS = 4, TOTAL = COLS * ROWS;
const DOT_RATIO    = 0.58;
const SPAWN_MS     = 1200;
const DOT_LIFE_MS  = 2500;

// ── STATE ──
let gameMode = 30, timeLeft = 30;
let timerInterval = null, dotInterval = null;
let activeDot = null, lastIdx = -1;

// ── SCREENS ──
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s =>
    s.classList.toggle('hidden', s.id !== id)
  );
}

// ── GRID ──
function buildGrid() {
  const g = document.getElementById('dot-grid');
  g.innerHTML = '';
  for (let i = 0; i < TOTAL; i++) {
    const c = document.createElement('div');
    c.className = 'cell';
    g.appendChild(c);
  }
}

function cellSize() {
  const c = document.querySelector('.cell');
  return c ? c.offsetWidth : 52;
}

// ── DOTS ──
function spawnDot() {
  if (activeDot) clearDot(activeDot, false);

  let idx;
  do { idx = Math.floor(Math.random() * TOTAL); } while (idx === lastIdx);
  lastIdx = idx;

  const cell = document.querySelectorAll('.cell')[idx];
  const size = Math.round(cellSize() * DOT_RATIO);

  const dot = document.createElement('div');
  dot.className = 'dot';
  dot.style.cssText = `width:${size}px;height:${size}px;`;
  cell.appendChild(dot);

  requestAnimationFrame(() => requestAnimationFrame(() => dot.classList.add('visible')));

  const autoT = setTimeout(() => {
    if (activeDot?.el === dot) clearDot(activeDot, false);
  }, DOT_LIFE_MS);

  activeDot = { el: dot, cell, timeout: autoT };

  dot.addEventListener('pointerdown', e => {
    e.stopPropagation();
    if (activeDot?.el === dot) popDot(activeDot);
  });
}

function popDot({ el, cell, timeout }) {
  clearTimeout(timeout);
  activeDot = null;

  const size = parseInt(el.style.width);
  const ripple = document.createElement('div');
  ripple.className = 'ripple';
  ripple.style.cssText = `width:${size}px;height:${size}px;`;
  cell.appendChild(ripple);
  setTimeout(() => ripple.remove(), 480);

  el.classList.add('popping');
  setTimeout(() => el.remove(), 130);

  if (navigator.vibrate) navigator.vibrate(20);
}

function clearDot(obj, animated) {
  if (!obj) return;
  clearTimeout(obj.timeout);
  if (obj === activeDot) activeDot = null;
  if (animated) {
    obj.el.classList.add('popping');
    setTimeout(() => obj.el?.remove(), 130);
  } else {
    obj.el?.remove();
  }
}

// ── COUNTDOWN ──
function runCountdown(cb) {
  const overlay = document.getElementById('countdown-overlay');
  const numEl   = document.getElementById('countdown-num');
  let n = 3;
  overlay.classList.add('show');

  function tick() {
    numEl.textContent = n === 0 ? 'START' : n;
    numEl.style.animation = 'none';
    void numEl.offsetWidth;
    numEl.style.animation = 'countPop 0.9s ease both';
    if (n === 0) {
      setTimeout(() => { overlay.classList.remove('show'); cb(); }, 700);
    } else {
      n--;
      setTimeout(tick, 900);
    }
  }
  tick();
}

// ── GAME ──
function startGame(mode) {
  gameMode = mode;
  timeLeft = mode;
  showScreen('game-screen');
  buildGrid();

  runCountdown(() => {
    spawnDot();
    dotInterval   = setInterval(spawnDot, SPAWN_MS);
    timerInterval = setInterval(() => {
      timeLeft--;
      if (timeLeft <= 0) endGame();
    }, 1000);
  });
}

function endGame() {
  clearInterval(timerInterval);
  clearInterval(dotInterval);
  timerInterval = dotInterval = null;
  if (activeDot) { clearDot(activeDot, true); activeDot = null; }
  spawnBursts();
  setTimeout(() => showScreen('end-screen'), 550);
}

function spawnBursts() {
  for (let i = 0; i < 7; i++) {
    setTimeout(() => {
      const b = document.createElement('div');
      b.className = 'burst';
      const s = 20 + Math.random() * 32;
      b.style.cssText = `width:${s}px;height:${s}px;`
        + `left:${10+Math.random()*80}%;top:${10+Math.random()*80}%;`
        + `background:var(--accent);`;
      document.body.appendChild(b);
      setTimeout(() => b.remove(), 750);
    }, i * 50);
  }
}

// ── INIT ──
showScreen('start-screen');
window.addEventListener('resize', () => {
  if (!document.getElementById('game-screen').classList.contains('hidden')) buildGrid();
});
</script>
</body>
</html>
